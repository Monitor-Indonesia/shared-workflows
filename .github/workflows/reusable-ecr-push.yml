name: Reusable ECR Build and Push

on:
  workflow_call:
    inputs:
      DEPLOYMENT_NAME:
        required: true
        type: string
      CONTAINER_NAME:
        required: true
        type: string
      NAMESPACE:
        required: true
        type: string
    secrets:
      AWS_REGION:
        required: true
      ECR_REPOSITORY:
        required: true
      AWS_ROLE_ARN:
        required: true
      NPM_TOKEN:
        required: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          DOCKER_FLAGS=

          if [ -z "$NPM_TOKEN" ]; then
            echo "No NPM_TOKEN found, building standard image."
          else
            echo "NPM_TOKEN detected, using secret mount."
            DOCKER_FLAGS="--secret id=npm_token,env=NPM_TOKEN"
          fi

          docker build $DOCKER_FLAGS -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          # Pass the registry URL to the next step
          echo "full_image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update EKS Kubeconfig
        run: |
          aws eks update-kubeconfig --name monitor-indonesia-prod-cluster --region ap-southeast-3

      - name: Deploy to EKS
        run: |
          kubectl set image deployment/${{ inputs.DEPLOYMENT_NAME }} \
            ${{ inputs.CONTAINER_NAME }}=${{ steps.build-image.outputs.full_image }} \
            -n ${{ inputs.NAMESPACE }}

          kubectl rollout status deployment/${{ inputs.DEPLOYMENT_NAME }} -n ${{ inputs.NAMESPACE }}
